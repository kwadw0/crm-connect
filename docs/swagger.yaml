basePath: /
definitions:
  auth.LoginUserDto:
    properties:
      email:
        type: string
      password:
        type: string
    required:
    - email
    - password
    type: object
  auth.RegisterUserDto:
    properties:
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 6
        type: string
      phone:
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - phone
    type: object
  organizations.CreateOrganizationDto:
    properties:
      description:
        type: string
      industry:
        type: string
      name:
        type: string
      owner_role:
        type: string
      primary_customer_type:
        type: string
      primary_use_case:
        type: string
      referral_source:
        type: string
      team_size:
        type: string
      website_url:
        type: string
    required:
    - description
    - industry
    - name
    - owner_role
    - primary_customer_type
    - primary_use_case
    - team_size
    type: object
  organizations.OrganizationResponseDto:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      industry:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      owner_role:
        type: string
      primary_customer_type:
        type: string
      primary_use_case:
        type: string
      referral_source:
        type: string
      team_size:
        type: string
      updated_at:
        type: string
      website_url:
        type: string
    type: object
  organizations.UpdateOrganizationDto:
    properties:
      description:
        type: string
      industry:
        type: string
      is_active:
        type: boolean
      name:
        type: string
      owner_role:
        type: string
      primary_customer_type:
        type: string
      primary_use_case:
        type: string
      referral_source:
        type: string
      team_size:
        type: string
      website_url:
        type: string
    type: object
  roles.CreateRoleDTO:
    properties:
      description:
        type: string
      name:
        type: string
    required:
    - name
    type: object
  roles.RoleResponseDTO:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      updated_at:
        type: string
    type: object
  roles.UpdateRoleDTO:
    properties:
      description:
        type: string
      name:
        type: string
    type: object
  users.CreateUserDto:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      password:
        minLength: 6
        type: string
      phone:
        type: string
      roleID:
        type: string
    required:
    - email
    - first_name
    - last_name
    - password
    - phone
    - roleID
    type: object
  users.LoginResponse:
    properties:
      access_token:
        type: string
      email:
        type: string
      first_name:
        type: string
    type: object
  users.UpdateUserDto:
    properties:
      avatar_url:
        type: string
      email:
        type: string
      first_name:
        type: string
      last_name:
        type: string
      phone:
        type: string
      roleID:
        type: string
    type: object
  users.UserResponseDto:
    properties:
      access_token:
        type: string
      avatar_url:
        type: string
      created_at:
        type: string
      email:
        type: string
      first_name:
        type: string
      id:
        type: string
      last_name:
        type: string
      organization_id:
        type: string
      phone:
        type: string
      role_id:
        type: string
      updated_at:
        type: string
    type: object
  utils.JsonResponse:
    properties:
      data: {}
      error: {}
      message:
        type: string
      statusCode:
        type: integer
    type: object
host: localhost:3000
info:
  contact: {}
  description: The WhatsCRM API
  title: WhatsCRM API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login credentials
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginUserDto'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.JsonResponse'
            - properties:
                Data:
                  $ref: '#/definitions/users.LoginResponse'
              type: object
      summary: Login an existing user
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
