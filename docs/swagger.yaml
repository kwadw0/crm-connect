        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.JsonResponse'
            - properties:
                Data:
                  $ref: '#/definitions/organizations.OrganizationResponseDto'
              type: object
      summary: Get organization by ID
      tags:
      - Organizations
    put:
      consumes:
      - application/json
      parameters:
      - description: Organization ID
        in: path
        name: id
        required: true
        type: string
      - description: Update details
        in: body
        name: request
        required: true
